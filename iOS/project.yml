name: Earplugtrack
options:
  bundleIdPrefix: com.shimondeitel.earpluglog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Earplugtrack:
    type: application
    platform: iOS
    sources:
      - path: Earplugtrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.earpluglog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Earplugtrack/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  EarplugtrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EarplugtrackTests
      - path: Earplugtrack.storekit
    dependencies:
      - target: Earplugtrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.earpluglog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  EarplugtrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: EarplugtrackUITests
    dependencies:
      - target: Earplugtrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.earpluglog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Earplugtrack:
    build:
      targets:
        Earplugtrack: all
        EarplugtrackTests: [test]
        EarplugtrackUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Earplugtrack.storekit
    test:
      config: Debug
      storeKitConfiguration: Earplugtrack.storekit
      targets:
        - EarplugtrackTests
        - EarplugtrackUITests
    archive:
      config: Release
